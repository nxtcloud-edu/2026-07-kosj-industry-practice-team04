AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Moa frontend hosting in ap-northeast-2 (Seoul): private versioned S3, CloudFront
  OAC, SPA routing, and a GitHub Actions OIDC deployment role.

Parameters:
  GitHubOidcProviderArn:
    Type: String
    Description: ARN of the existing token.actions.githubusercontent.com IAM OIDC provider.
    AllowedPattern: '^arn:[^:]+:iam::[0-9]{12}:oidc-provider/token\.actions\.githubusercontent\.com$'
    ConstraintDescription: Must be the ARN of the GitHub Actions OIDC provider in this account.

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireNoncurrentVersionsAfter30Days
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
          - Id: AbortIncompleteMultipartUploadsAfter7Days
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-frontend-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${AWS::StackName}-frontend-cache-policy'
        DefaultTTL: 0
        MaxTTL: 31536000
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none

  FrontendSpaRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      AutoPublish: true
      Name: !Sub '${AWS::StackName}-spa-rewrite'
      FunctionConfig:
        Comment: Rewrite SPA screen routes without masking API, upload, asset, or file requests.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri;

          if (request.method !== 'GET' && request.method !== 'HEAD') {
            return request;
          }

          var bypassPrefixes = ['/api', '/uploads', '/assets'];
          for (var index = 0; index < bypassPrefixes.length; index += 1) {
            var prefix = bypassPrefixes[index];
            if (uri === prefix || uri.startsWith(prefix + '/')) {
              return request;
            }
          }

          var finalPathSegment = uri.slice(uri.lastIndexOf('/') + 1);
          if (finalPathSegment.includes('.')) {
            return request;
          }

          request.uri = '/index.html';
          return request;
        }

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: Moa frontend
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref FrontendCachePolicy
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt FrontendSpaRewriteFunction.FunctionARN
          TargetOriginId: frontend-s3-origin
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt FrontendBucket.RegionalDomainName
            Id: frontend-s3-origin
            OriginAccessControlId: !GetAtt FrontendOriginAccessControl.Id
            S3OriginConfig: {}
        PriceClass: PriceClass_100

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceAccount: !Ref AWS::AccountId
                AWS:SourceArn: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Short-lived GitHub Actions role for Moa frontend deployments.
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProviderArn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
                token.actions.githubusercontent.com:sub: repo:nxtcloud-edu/2026-07-kosj-industry-practice-team04:ref:refs/heads/main
      Policies:
        - PolicyName: DeployFrontend
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadDeploymentBucketMetadata
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource: !GetAtt FrontendBucket.Arn
              - Sid: UploadAndReadVersionedFrontendObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource: !Sub '${FrontendBucket.Arn}/*'
              - Sid: InvalidateAndVerifyDistribution
                Effect: Allow
                Action:
                  - cloudfront:CreateInvalidation
                  - cloudfront:GetDistribution
                  - cloudfront:GetInvalidation
                Resource: !Sub 'arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

Outputs:
  FrontendBucketName:
    Description: Value for the GitHub Actions S3_BUCKET_NAME repository variable.
    Value: !Ref FrontendBucket
  CloudFrontDistributionId:
    Description: Value for the GitHub Actions CLOUDFRONT_DISTRIBUTION_ID repository variable.
    Value: !Ref FrontendDistribution
  CloudFrontDomainName:
    Description: Public frontend URL hostname.
    Value: !GetAtt FrontendDistribution.DomainName
  GitHubDeployRoleArn:
    Description: Value for the GitHub Actions AWS_ROLE_ARN repository variable.
    Value: !GetAtt GitHubActionsDeployRole.Arn
