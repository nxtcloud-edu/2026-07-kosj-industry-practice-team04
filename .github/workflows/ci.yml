# CI — PR·main 푸시마다 백엔드 테스트와 프론트 빌드를 강제한다 (Issue #54)
# main 보호 규칙의 required status check로 등록해 깨진 코드가 머지되지 않게 한다.
name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: backend-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      - name: 백엔드 테스트 (node --test)
        working-directory: backend
        run: npm test

  frontend-build:
    name: frontend-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 의존성 설치
        working-directory: frontend
        run: npm ci
      - name: 프로덕션 빌드 검증
        working-directory: frontend
        run: npm run build
